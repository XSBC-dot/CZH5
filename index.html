<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>脑卒中H5 CZH5</title>
<base href="./">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Microsoft YaHei,sans-serif;}
body{background:#f8fafc;min-height:100vh;}
#loading{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;}
.load-spin{width:40px;height:40px;border:4px #0077B6 solid;border-top:transparent;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:70px;}
.page{display:none;padding:20px;min-height:calc(100vh - 70px);flex-direction:column;justify-content:center;text-align:center;}
.page.active{display:flex;}
.card{background:#fff;border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 1px 8px #00000010;text-align:left;}
.btn-blue{width:100%;background:#0077B6;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;margin:8px 0;}
.btn-white{width:100%;background:#fff;color:#0077B6;border:2px solid #0077B6;border-radius:12px;padding:14px;font-size:16px;margin:8px 0;}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:#fff;border-top:1px solid #eee;display:flex;height:65px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#666;font-size:12px;}
.nav-item.active{color:#0077B6;}
input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin:6px 0;font-size:15px;}
</style>
</head>
<body>
<div id="loading">
    <div class="load-spin"></div>
</div>
<div class="wrap">
    <!-- 首页 默认激活，无JS也能显示文字 -->
    <div id="page-home" class="page active">
        <div style="width:160px;height:160px;background:#e0f2fe;border-radius:50%;margin:0 auto 30px;display:flex;align-items:center;justify-content:center;font-size:60px;color:#0077B6;">脑</div>
        <h1 style="font-size:24px;color:#111;margin-bottom:16px;">脑卒中风险自测工具</h1>
        <p style="color:#666;margin-bottom:40px;">卒中自测 | 科普知识 | 急救指南</p>
        <button class="btn-blue" onclick="switchPage('page-test')">开始风险自测</button>
        <button class="btn-white" onclick="switchPage('page-know')">科普知识</button>
    </div>

    <!-- 自测页面 -->
    <div id="page-test" class="page">
        <h2 style="font-size:20px;margin-bottom:20px;">卒中风险问卷</h2>
        <div class="card">
            <label>年龄</label>
            <select id="age">
                <option value="">请选择年龄段</option>
                <option value="1">40岁以下</option>
                <option value="2">40-49岁</option>
                <option value="3">50-59岁</option>
                <option value="4">60岁以上</option>
            </select>
        </div>
        <div class="card">
            <label>是否确诊高血压</label>
            <input type="radio" name="hp" value="yes"> 是
            <input type="radio" name="hp" value="no"> 否
        </div>
        <div class="card">
            <label>是否长期吸烟</label>
            <input type="radio" name="smoke" value="yes"> 是
            <input type="radio" name="smoke" value="no"> 否
        </div>
        <button class="btn-blue" onclick="showResult()">查看风险评估</button>
        <div id="result-box" class="card" style="display:none;text-align:center;margin-top:20px;">
            <h3>你的风险等级：<span style="color:#0077B6">低风险</span></h3>
        </div>
    </div>

    <!-- 科普页面 -->
    <div id="page-know" class="page">
        <h2 style="font-size:20px;margin-bottom:20px;">FAST卒中识别口诀</h2>
        <div class="card">
            <p style="margin:8px 0;"><b>F</b> 面部歪斜，单侧嘴角下垂</p>
            <p style="margin:8px 0;"><b>A</b> 单侧手臂无力，举不起来</p>
            <p style="margin:8px 0;"><b>S</b> 说话含糊、口齿不清</p>
            <p style="margin:8px 0;"><b>T</b> 立刻拨打120急救电话</p>
            <p style="margin-top:16px;color:#d00000;font-weight:bold;">出现任意一条，马上就医！</p>
        </div>
    </div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
    <div class="nav-item active" data-id="page-home" onclick="switchPage('page-home')">
        <span style="font-size:18px;">🏠</span>
        <span>首页</span>
    </div>
    <div class="nav-item" data-id="page-test" onclick="switchPage('page-test')">
        <span style="font-size:18px;">📋</span>
        <span>自测</span>
    </div>
    <div class="nav-item" data-id="page-know" onclick="switchPage('page-know')">
        <span style="font-size:18px;">📖</span>
        <span>科普</span>
    </div>
</div>

<script>
// 加载遮罩关闭
window.onload = function(){
    setTimeout(()=>{
        document.getElementById('loading').style.display = 'none';
    },800);
}
// 页面切换函数
function switchPage(targetId){
    // 隐藏所有页面
    document.querySelectorAll('.page').forEach(item=>{
        item.classList.remove('active');
        item.style.display = 'none';
    })
    // 展示目标页面
    const targetPage = document.getElementById(targetId);
    targetPage.classList.add('active');
    targetPage.style.display = 'flex';
    // 导航高亮
    document.querySelectorAll('.nav-item').forEach(nav=>nav.classList.remove('active'));
    document.querySelector(`.nav-item[data-id="${targetId}"]`).classList.add('active');
}
// 展示评估结果
function showResult(){
    document.getElementById('result-box').style.display = 'block';
}
</script>
</body>
</html>
